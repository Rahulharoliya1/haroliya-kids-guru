<!DOCTYPE html>
<html>
<head>
<title>Learn Colors | Haroliya Kids Guru</title>
<style>
body{
    font-family:Arial,sans-serif;
    background:#f5fbff;
    text-align:center;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    max-width:1000px;
    margin:auto;
}

.card{
    padding:30px;
    border-radius:15px;
    font-size:24px;
    font-weight:bold;
    color:white;
}

.red{background:red;}
.blue{background:blue;}
.green{background:green;}
.yellow{background:gold;color:black;}
.orange{background:orange;}
.purple{background:purple;}
.pink{background:hotpink;}
.black{background:black;}
.brown{background:brown;}
.gray{background:gray;}
</style>
</head>
<body>

<h1>🎨 Learn Colors</h1>

<div class="grid">

<div class="card red">Red</div>
<div class="card blue">Blue</div>
<div class="card green">Green</div>
<div class="card yellow">Yellow</div>
<div class="card orange">Orange</div>
<div class="card purple">Purple</div>
<div class="card pink">Pink</div>
<div class="card black">Black</div>
<div class="card brown">Brown</div>
<div class="card gray">Gray</div>

</div>

<br>

<a href="english.html">⬅ Back to English</a>

</body>
</html>
