<!DOCTYPE html>
<html>
<head>
<title>Learn Numbers | Haroliya Kids Guru</title>
<style>
body{
    font-family:Arial,sans-serif;
    background:#f5fbff;
    text-align:center;
    padding:20px;
}

h1{
    color:#4CAF50;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
    max-width:1000px;
    margin:auto;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
    font-size:20px;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>🔢 Learn Numbers</h1>

<div class="grid">

<div class="card">1 - One</div>
<div class="card">2 - Two</div>
<div class="card">3 - Three</div>
<div class="card">4 - Four</div>
<div class="card">5 - Five</div>
<div class="card">6 - Six</div>
<div class="card">7 - Seven</div>
<div class="card">8 - Eight</div>
<div class="card">9 - Nine</div>
<div class="card">10 - Ten</div>

</div>

<br>

<a href="english.html">⬅ Back to English</a>

</body>
</html>
